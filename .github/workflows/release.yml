name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: forgeterm-linux-x86_64
            service_file: dist/forgeterm-agent.service
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: forgeterm-linux-aarch64
            service_file: dist/forgeterm-agent.service
          - target: x86_64-apple-darwin
            runner: macos-latest
            artifact: forgeterm-darwin-x86_64
            service_file: dist/com.forgeterm.agent.plist
          - target: aarch64-apple-darwin
            runner: macos-latest
            artifact: forgeterm-darwin-aarch64
            service_file: dist/com.forgeterm.agent.plist

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }} -p forgeterm-agent -p forgeterm

      - name: Package
        env:
          TARGET: ${{ matrix.target }}
          ARTIFACT: ${{ matrix.artifact }}
          SERVICE_FILE: ${{ matrix.service_file }}
        run: |
          mkdir -p staging
          cp "target/${TARGET}/release/forgeterm-agent" staging/
          cp "target/${TARGET}/release/forgeterm" staging/
          cp config/agent.toml staging/
          cp config/security-rules.toml staging/
          cp "${SERVICE_FILE}" staging/
          tar czf "${ARTIFACT}.tar.gz" -C staging .

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            --title "Forgeterm ${TAG_NAME}" \
            --generate-notes \
            artifacts/**/*.tar.gz
